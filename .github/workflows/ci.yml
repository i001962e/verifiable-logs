name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Lint shell syntax
        run: bash -n scripts/*.sh
      - name: Run tests
        run: python3 -m unittest -v tests.test_scripts
